# ============================================================
#  Configuracion de Mosquitto para el proyecto seguidor
# ============================================================

# Escuchar en el puerto MQTT estandar
listener 1883
protocol mqtt

# Escuchar tambien en websockets (util para tableros web)
listener 9001
protocol websockets

# Permitir conexiones sin usuario/contraseña (red local privada)
# NOTA: esto es seguro porque la red del hotspot es privada y
# controlada por ti. Para una red publica se requeriria autenticacion.
allow_anonymous true

# Guardar datos de forma persistente
persistence true
persistence_location /mosquitto/data/

# Registro de actividad
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
